name: Upload Python package to PyPI register

on:
    push:
        tags: ["v*"]
    workflow_dispatch:

permissions:
    contents: read
    id-token: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment: pypi
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.x"
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install build
            - name: Build package
              run: python -m build
            - name: Publish package
              uses: pypa/gh-action-pypi-publish@release/v1
